<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nick 飲食日誌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1>🥗 Nick 飲食日誌</h1>
    <p>與教練同步 · 達成體態目標</p>
    <div class="header-people" aria-label="教練 Charlie 與 Nick 角色介紹">
      <div class="header-person">
        <img class="header-person-avatar" src="images/avatars/charlie.svg" alt="教練 Charlie 頭像">
        <div class="header-person-text">
          <span class="header-person-role">Coach</span>
          <span class="header-person-name">Charlie</span>
          <span class="header-person-note">飲食調整與追蹤</span>
        </div>
      </div>
      <span class="header-link-pill">一起達標</span>
      <div class="header-person">
        <img class="header-person-avatar" src="images/avatars/nick.svg" alt="Nick 頭像">
        <div class="header-person-text">
          <span class="header-person-role">Member</span>
          <span class="header-person-name">Nick</span>
          <span class="header-person-note">每日飲食與體態紀錄</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="daily">
      <span class="tab-icon">📋</span>每日
    </button>
    <button class="tab-btn" data-tab="history">
      <span class="tab-icon">📅</span>歷史
    </button>
    <button class="tab-btn" data-tab="inbody">
      <span class="tab-icon">💪</span>InBody
    </button>
    <button class="tab-btn" data-tab="goals">
      <span class="tab-icon">🎯</span>目標
    </button>
  </nav>

  <main id="tabContainer">
    <div class="card">
      <div class="skeleton" style="height: 180px;"></div>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="">
  </div>

  <!-- Footer -->
  <footer class="app-footer">
    <span id="lastUpdated"></span>
  </footer>

  <script type="module">
    // ===== App Shell =====
    import { state, MANIFEST_POLL_MS, TAB_PARTIALS } from './js/state.js';
    import { fetchJSON, fetchHTML } from './js/api.js';
    import { getTodayTaipei, getAdjacentRecordedDates, updateLastUpdatedLabel } from './js/utils.js';
    import { loadDay } from './js/tabs/daily.js';
    import { renderHistory } from './js/tabs/history.js';
    import { renderInBody } from './js/tabs/inbody.js';
    import { renderGoals } from './js/tabs/goals.js';

    function renderShellError(message) {
      document.getElementById('tabContainer').innerHTML = `
        <div class="card">
          <div class="empty-state" style="padding: 32px 20px;">
            <div class="empty-icon">⚠️</div>
            <h3>頁面載入失敗</h3>
            <p>${message}</p>
          </div>
        </div>
      `;
    }

    async function loadTabPartials() {
      const partials = await Promise.all(TAB_PARTIALS.map(path => fetchHTML(path)));
      if (partials.some(partial => !partial)) {
        renderShellError('部分內容檔案不存在，請確認 partials 目錄是否完整。');
        return false;
      }
      document.getElementById('tabContainer').innerHTML = partials.join('\n');
      return true;
    }

    async function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.toggle('active', content.id === tabId);
      });

      if (tabId === 'history') await renderHistory();
      if (tabId === 'inbody') await renderInBody();
      if (tabId === 'goals') renderGoals(state.goals);
    }

    function setupTabNavigation() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          await switchTab(btn.dataset.tab);
        });
      });
    }

    function setupDateNavigation() {
      document.getElementById('prevDay').addEventListener('click', () => {
        const { prev } = getAdjacentRecordedDates(state.currentDate);
        if (prev) loadDay(prev);
      });
      document.getElementById('nextDay').addEventListener('click', () => {
        const { next } = getAdjacentRecordedDates(state.currentDate);
        if (next) loadDay(next);
      });
    }

    async function goToDay(dateStr) {
      await loadDay(dateStr);
      await switchTab('daily');
    }

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    async function refreshManifest() {
      const latestManifest = await fetchJSON('data/manifest.json');
      if (!latestManifest) return;

      const previousLastUpdated = state.manifest?.lastUpdated;
      state.manifest = latestManifest;
      updateLastUpdatedLabel(latestManifest.lastUpdated);

      if (!previousLastUpdated || previousLastUpdated === latestManifest.lastUpdated) return;

      state.dayCache = {};
      state.inbodyCache = {};

      await loadDay(state.currentDate, { forceRefresh: true });
      if (document.getElementById('history').classList.contains('active')) await renderHistory();
      if (document.getElementById('inbody').classList.contains('active')) await renderInBody();
    }

    async function init() {
      const partialsLoaded = await loadTabPartials();
      if (!partialsLoaded) return;

      setupTabNavigation();
      setupDateNavigation();

      const [goals, manifest] = await Promise.all([
        fetchJSON('data/goals.json'),
        fetchJSON('data/manifest.json')
      ]);

      state.goals = goals;
      state.manifest = manifest;

      const today = getTodayTaipei();
      await loadDay(today);

      updateLastUpdatedLabel(manifest?.lastUpdated);
      const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'daily';
      if (activeTab !== 'daily') await switchTab(activeTab);

      window.setInterval(refreshManifest, MANIFEST_POLL_MS);
    }

    // Expose functions used by inline HTML event handlers
    window.openLightbox = openLightbox;
    window.closeLightbox = closeLightbox;
    window.goToDay = goToDay;

    init();
  </script>
</body>
</html>
