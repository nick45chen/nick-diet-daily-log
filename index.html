<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nick 飲食日誌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Notion + Material 3 Design Tokens ===== */
    :root {
      --md-primary: #6b5c4b;
      --md-on-primary: #faf7f2;
      --md-primary-container: #e9e0d4;
      --md-on-primary-container: #45392c;
      --md-secondary: #867765;
      --md-on-secondary: #fffdf8;
      --md-secondary-container: #efe7db;
      --md-tertiary: #617466;
      --md-tertiary-container: #dce7dc;
      --md-error: #b5544f;
      --md-error-container: #f4ddda;
      --md-surface: #f7f5f2;
      --md-surface-dim: #e7e1d8;
      --md-surface-bright: #fcfbf8;
      --md-surface-container-lowest: #fffdfa;
      --md-surface-container-low: #f5f1eb;
      --md-surface-container: #eee8df;
      --md-surface-container-high: #e6e0d7;
      --md-surface-container-highest: #d9d2c8;
      --md-on-surface: #37352f;
      --md-on-surface-variant: #6b675f;
      --md-outline: #b8b1a5;
      --md-outline-variant: #e2dbd1;
      --md-shadow: rgba(55, 53, 47, 0.08);

      --md-shape-sm: 10px;
      --md-shape-md: 18px;
      --md-shape-lg: 24px;
      --md-shape-xl: 32px;

      --md-elevation-1: 0 1px 2px var(--md-shadow), 0 8px 24px rgba(55, 53, 47, 0.04);
      --md-elevation-2: 0 10px 30px rgba(55, 53, 47, 0.07), 0 2px 8px rgba(55, 53, 47, 0.04);

      --color-calories: #b76c47;
      --color-calories-container: #f3e7dd;
      --color-protein: #5f7a63;
      --color-protein-container: #e6eee6;
      --color-fat: #a76161;
      --color-fat-container: #f3e3e3;
      --color-carbs: #7d6d94;
      --color-carbs-container: #ece7f2;
      --chart-weight: #5f7a63;
      --chart-body-fat: #b76c47;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(107, 92, 75, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(97, 116, 102, 0.08), transparent 28%),
        linear-gradient(180deg, #fbfaf8 0%, var(--md-surface) 48%, #f1ede6 100%);
      color: var(--md-on-surface);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Header ===== */
    .app-header {
      width: min(860px, calc(100% - 32px));
      margin: 16px auto 10px;
      background:
        radial-gradient(circle at top right, rgba(107, 92, 75, 0.18), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.84), rgba(244,239,231,0.94));
      color: var(--md-on-surface);
      padding: 30px 22px 22px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: var(--md-shape-xl);
      box-shadow: var(--md-elevation-2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .app-header::after {
      content: '';
      position: absolute;
      inset: auto auto -80px -60px;
      width: 220px;
      height: 220px;
      background: rgba(107, 92, 75, 0.08);
      border-radius: 50%;
    }
    .app-header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
      position: relative;
      z-index: 1;
    }
    .app-header p {
      font-size: 13px;
      color: var(--md-on-surface-variant);
      margin-top: 6px;
      position: relative;
      z-index: 1;
    }
    .header-people {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(255,255,255,0.9);
      max-width: 100%;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(55, 53, 47, 0.08);
      flex-wrap: wrap;
    }
    .header-person {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .header-person-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      padding: 4px;
      object-fit: cover;
      box-shadow: 0 6px 14px rgba(55, 53, 47, 0.12);
      flex-shrink: 0;
    }
    .header-person-text {
      min-width: 0;
      text-align: left;
      line-height: 1.2;
    }
    .header-person-role {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--md-on-surface-variant);
    }
    .header-person-name {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-top: 2px;
    }
    .header-person-note {
      display: block;
      font-size: 11px;
      margin-top: 3px;
      color: var(--md-on-surface-variant);
      white-space: nowrap;
    }
    .header-link-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--md-primary);
      color: var(--md-on-primary);
      border: 1px solid rgba(107, 92, 75, 0.12);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      box-shadow: 0 6px 14px rgba(107, 92, 75, 0.18);
    }

    /* ===== Tab Navigation ===== */
    .tab-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      position: sticky;
      top: 8px;
      z-index: 100;
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
      padding-bottom: 10px;
    }
    .tab-btn {
      min-height: 64px;
      padding: 12px 8px 10px;
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--md-on-surface-variant);
      cursor: pointer;
      position: relative;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
      box-shadow: var(--md-elevation-1);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .tab-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.88);
      color: var(--md-on-surface);
    }
    .tab-btn.active {
      color: var(--md-on-primary-container);
      font-weight: 700;
      background: linear-gradient(180deg, var(--md-primary-container), #f2ebe0);
      border-color: rgba(107, 92, 75, 0.18);
      box-shadow: var(--md-elevation-2);
    }
    .tab-btn .tab-icon {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }
    .tab-btn:focus-visible,
    .date-nav button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(107, 92, 75, 0.16);
    }

    /* ===== Main Content ===== */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 6px 16px 20px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ===== Cards ===== */
    .card {
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--md-elevation-1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--md-on-surface);
    }

    /* ===== Date Navigation ===== */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .date-nav button {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.82);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-on-surface);
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      box-shadow: var(--md-elevation-1);
    }
    .date-nav button:hover {
      transform: translateY(-1px);
      background: var(--md-surface-bright);
      box-shadow: var(--md-elevation-2);
    }
    .date-nav button:disabled { opacity: 0.3; cursor: default; }
    .date-nav .date-display {
      font-size: 18px;
      font-weight: 600;
      min-width: 180px;
      text-align: center;
    }
    .date-nav .date-weekday {
      font-size: 13px;
      color: var(--md-on-surface-variant);
      font-weight: 400;
      margin-top: 3px;
    }

    /* ===== Macro Summary ===== */
    .macro-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .macro-card {
      text-align: center;
      padding: 16px 10px 14px;
      border-radius: 22px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.88);
      position: relative;
      overflow: hidden;
      box-shadow: var(--md-elevation-1);
    }
    .macro-card .macro-icon { font-size: 20px; margin-bottom: 4px; }
    .macro-card .macro-label {
      font-size: 11px;
      color: var(--md-on-surface-variant);
      margin-bottom: 4px;
    }
    .macro-card .macro-value {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }
    .macro-card .macro-goal {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--md-on-surface-variant);
      margin-top: 2px;
    }
    .macro-card .macro-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: rgba(255,255,255,0.75);
    }
    .macro-card .macro-bar-fill {
      height: 100%;
      border-radius: 0 2px 2px 0;
      transition: width 0.5s ease;
    }
    .macro-card.calories {
      background: linear-gradient(180deg, var(--color-calories-container), rgba(255,255,255,0.88));
    }
    .macro-card.calories .macro-value { color: var(--color-calories); }
    .macro-card.calories .macro-bar-fill { background: var(--color-calories); }
    .macro-card.protein {
      background: linear-gradient(180deg, var(--color-protein-container), rgba(255,255,255,0.88));
    }
    .macro-card.protein .macro-value { color: var(--color-protein); }
    .macro-card.protein .macro-bar-fill { background: var(--color-protein); }
    .macro-card.fat {
      background: linear-gradient(180deg, var(--color-fat-container), rgba(255,255,255,0.88));
    }
    .macro-card.fat .macro-value { color: var(--color-fat); }
    .macro-card.fat .macro-bar-fill { background: var(--color-fat); }
    .macro-card.carbs {
      background: linear-gradient(180deg, var(--color-carbs-container), rgba(255,255,255,0.88));
    }
    .macro-card.carbs .macro-value { color: var(--color-carbs); }
    .macro-card.carbs .macro-bar-fill { background: var(--color-carbs); }

    /* ===== Cost Summary ===== */
    .cost-summary {
      margin-bottom: 16px;
      padding: 18px 20px;
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, rgba(183, 108, 71, 0.14), transparent 28%),
        linear-gradient(155deg, rgba(255,255,255,0.9), rgba(246,239,231,0.92));
      border: 1px solid rgba(255,255,255,0.88);
      box-shadow: var(--md-elevation-1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .cost-summary-kicker {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-calories);
      margin-bottom: 8px;
    }
    .cost-summary-amount {
      font-family: 'Inter', sans-serif;
      font-size: 34px;
      font-weight: 700;
      color: var(--color-calories);
      line-height: 1.1;
    }
    .cost-summary-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--md-on-surface-variant);
    }

    /* ===== Meal Card ===== */
    .meal-card {
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.86);
      border-radius: 24px;
      margin-bottom: 12px;
      box-shadow: var(--md-elevation-1);
      overflow: hidden;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .meal-header {
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(226, 219, 209, 0.7);
      background: linear-gradient(180deg, rgba(255,255,255,0.5), rgba(245,241,235,0.4));
    }
    .meal-header-main {
      min-width: 0;
      flex: 1;
    }
    .meal-header .meal-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--md-on-surface);
    }
    .meal-header .meal-meta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--md-on-surface-variant);
    }
    .meal-header-totals {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .meal-header .meal-cost {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--color-calories-container);
      color: var(--color-calories);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
    }
    .meal-header .meal-kcal {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--color-calories);
    }
    .meal-subtotal-macros {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .meal-subtotal-macros span {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-on-surface-variant);
    }
    .meal-body { padding: 0 16px 14px; }
    .meal-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(226, 219, 209, 0.78);
      gap: 12px;
    }
    .meal-item:last-child { border-bottom: none; }
    .meal-item-photo {
      width: 56px;
      height: 56px;
      border-radius: var(--md-shape-sm);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--md-surface-container);
    }
    .meal-item-info { flex: 1; min-width: 0; }
    .meal-item-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meal-item-macros {
      display: flex;
      gap: 10px;
      font-size: 12px;
      color: var(--md-on-surface-variant);
      font-family: 'Inter', sans-serif;
    }
    .meal-item-macros span { white-space: nowrap; }

    /* ===== Meal Photos Gallery ===== */
    .meal-photos {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .meal-photos img {
      width: 120px;
      height: 90px;
      border-radius: var(--md-shape-sm);
      object-fit: cover;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(55, 53, 47, 0.12);
    }
    .meal-photos img:hover {
      transform: scale(1.04);
      box-shadow: 0 14px 24px rgba(55, 53, 47, 0.16);
    }

    /* ===== Advice Box ===== */
    .advice-box {
      background: linear-gradient(145deg, rgba(233,224,212,0.9), rgba(255,255,255,0.9));
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.9);
      border-left: 4px solid var(--md-primary);
      box-shadow: var(--md-elevation-1);
    }
    .advice-box .advice-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--md-primary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .advice-box .advice-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--md-on-surface);
    }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--md-on-surface-variant);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--md-on-surface); }
    .empty-state p { font-size: 14px; }

    /* ===== History Tab ===== */
    .history-list { list-style: none; }
    .history-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.86);
      border-radius: 22px;
      margin-bottom: 8px;
      box-shadow: var(--md-elevation-1);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      gap: 14px;
    }
    .history-item:hover {
      transform: translateY(-1px);
      box-shadow: var(--md-elevation-2);
    }
    .history-date-badge {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: var(--md-primary-container);
      color: var(--md-on-primary-container);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .history-date-badge .h-day {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }
    .history-date-badge .h-month {
      font-size: 10px;
      font-weight: 500;
    }
    .history-info { flex: 1; }
    .history-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .history-info .h-date { font-size: 14px; font-weight: 500; }
    .history-info .h-summary {
      font-size: 12px;
      color: var(--md-on-surface-variant);
      margin-top: 4px;
      font-family: 'Inter', sans-serif;
    }
    .history-cost {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--color-calories-container);
      color: var(--color-calories);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .history-arrow {
      color: var(--md-outline);
      font-size: 18px;
    }

    /* ===== InBody Tab ===== */
    .inbody-latest {
      background:
        radial-gradient(circle at top right, rgba(97, 116, 102, 0.18), transparent 26%),
        linear-gradient(160deg, rgba(255,255,255,0.88), rgba(236,232,223,0.96));
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.88);
      box-shadow: var(--md-elevation-2);
    }
    .inbody-latest .inbody-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--md-on-surface);
    }
    .inbody-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .inbody-metric {
      text-align: center;
      padding: 12px 8px;
      background: rgba(255,255,255,0.72);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.88);
      box-shadow: 0 8px 20px rgba(55, 53, 47, 0.06);
    }
    .inbody-metric .metric-label {
      font-size: 11px;
      color: var(--md-on-surface-variant);
      margin-bottom: 4px;
    }
    .inbody-metric .metric-value {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--chart-weight);
    }
    .inbody-metric .metric-unit {
      font-size: 11px;
      color: var(--md-on-surface-variant);
    }
    .inbody-photo-container {
      margin-top: 16px;
      text-align: center;
    }
    .inbody-photo-container img {
      max-width: 100%;
      border-radius: var(--md-shape-md);
      cursor: pointer;
    }
    .inbody-chart-container {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.88);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--md-elevation-1);
    }
    .inbody-history-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.86);
      border-radius: 22px;
      margin-bottom: 8px;
      box-shadow: var(--md-elevation-1);
      cursor: pointer;
      gap: 12px;
    }

    /* ===== Goals Tab ===== */
    .goal-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid rgba(226, 219, 209, 0.76);
    }
    .goal-item:last-child { border-bottom: none; }
    .goal-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
    }
    .goal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .goal-value {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .goal-unit {
      font-size: 13px;
      color: var(--md-on-surface-variant);
      font-weight: 400;
    }

    /* ===== Image Lightbox ===== */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(28, 27, 24, 0.76);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 95%;
      max-height: 95%;
      border-radius: var(--md-shape-md);
      object-fit: contain;
    }

    /* ===== Footer ===== */
    .app-footer {
      text-align: center;
      padding: 16px 20px 22px;
      font-size: 12px;
      color: var(--md-on-surface-variant);
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .macro-grid { grid-template-columns: repeat(2, 1fr); }
      .inbody-metrics { grid-template-columns: repeat(2, 1fr); }
      .macro-card .macro-value { font-size: 18px; }
      .cost-summary-amount { font-size: 30px; }
      main { padding: 12px; }
      .tab-nav,
      .app-header {
        width: calc(100% - 24px);
      }
      .app-header {
        padding: 24px 16px 18px;
        margin-top: 12px;
      }
      .header-people {
        width: 100%;
        border-radius: 24px;
        padding: 12px;
      }
      .header-person {
        width: 100%;
        justify-content: center;
      }
      .header-person-text {
        text-align: center;
      }
      .header-link-pill {
        min-width: 0;
        width: 100%;
      }
      .meal-header {
        flex-direction: column;
      }
      .meal-header-totals {
        width: 100%;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 4px;
      }
      .meal-subtotal-macros {
        justify-content: flex-start;
      }
      .history-topline {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* ===== Loading Skeleton ===== */
    .skeleton {
      background: linear-gradient(90deg, var(--md-surface-container) 25%, var(--md-surface-container-high) 50%, var(--md-surface-container) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--md-shape-sm);
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ===== SVG Chart ===== */
    .trend-chart { width: 100%; overflow: visible; }
    .trend-line { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .trend-dot { cursor: pointer; }
    .trend-label { font-family: 'Inter', sans-serif; font-size: 10px; fill: var(--md-on-surface-variant); }
    .trend-value-label { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1>🥗 Nick 飲食日誌</h1>
    <p>與教練同步 · 達成體態目標</p>
    <div class="header-people" aria-label="教練 Charlie 與 Nick 角色介紹">
      <div class="header-person">
        <img class="header-person-avatar" src="images/avatars/charlie.svg" alt="教練 Charlie 頭像">
        <div class="header-person-text">
          <span class="header-person-role">Coach</span>
          <span class="header-person-name">Charlie</span>
          <span class="header-person-note">飲食調整與追蹤</span>
        </div>
      </div>
      <span class="header-link-pill">一起達標</span>
      <div class="header-person">
        <img class="header-person-avatar" src="images/avatars/nick.svg" alt="Nick 頭像">
        <div class="header-person-text">
          <span class="header-person-role">Member</span>
          <span class="header-person-name">Nick</span>
          <span class="header-person-note">每日飲食與體態紀錄</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="today">
      <span class="tab-icon">📋</span>今日
    </button>
    <button class="tab-btn" data-tab="history">
      <span class="tab-icon">📅</span>歷史
    </button>
    <button class="tab-btn" data-tab="inbody">
      <span class="tab-icon">💪</span>InBody
    </button>
    <button class="tab-btn" data-tab="goals">
      <span class="tab-icon">🎯</span>目標
    </button>
  </nav>

  <main id="tabContainer">
    <div class="card">
      <div class="skeleton" style="height: 180px;"></div>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="">
  </div>

  <!-- Footer -->
  <footer class="app-footer">
    <span id="lastUpdated"></span>
  </footer>

  <script>
    // ===== App State =====
    const state = {
      goals: null,
      manifest: null,
      currentDate: null,
      dayCache: {},
      inbodyCache: {}
    };

    const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];
    const MEAL_ICONS = { '早餐': '🌅', '午餐': '☀️', '晚餐': '🌙', '點心': '🍪', '消夜': '🌃' };
    const REQUEST_VERSION = Date.now().toString();
    const MANIFEST_POLL_MS = 60000;
    const TAB_PARTIALS = [
      'partials/today.html',
      'partials/history.html',
      'partials/inbody.html',
      'partials/goals.html'
    ];

    // ===== Utilities =====
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00+08:00');
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function getWeekday(dateStr) {
      const d = new Date(dateStr + 'T00:00:00+08:00');
      return `星期${WEEKDAYS[d.getDay()]}`;
    }

    function getTodayTaipei() {
      const now = new Date();
      const taipei = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
      return `${taipei.getFullYear()}-${String(taipei.getMonth()+1).padStart(2,'0')}-${String(taipei.getDate()).padStart(2,'0')}`;
    }

    function addDays(dateStr, n) {
      const d = new Date(dateStr + 'T00:00:00+08:00');
      d.setDate(d.getDate() + n);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function pct(value, goal) {
      if (!goal) return 0;
      return Math.min(Math.round((value / goal) * 100), 100);
    }

    function roundCost(value) {
      return Math.round(value * 1000) / 1000;
    }

    function formatCurrencyTWD(amount) {
      const value = Number(amount);
      if (!Number.isFinite(value)) return '';
      return `NT$${Number(value.toFixed(3)).toString()}`;
    }

    function getMealCost(meal) {
      const amount = Number(meal?.cost?.amount);
      return Number.isFinite(amount) ? amount : null;
    }

    function getDailyCost(data) {
      const total = Number(data?.dailyCostTotal?.amount);
      if (Number.isFinite(total)) return total;
      const costs = (data?.meals || []).map(getMealCost).filter(amount => amount !== null);
      if (!costs.length) return null;
      return roundCost(costs.reduce((sum, amount) => sum + amount, 0));
    }

    function withCacheBust(url, version = REQUEST_VERSION) {
      const target = new URL(url, window.location.href);
      target.searchParams.set('v', version);
      return target.toString();
    }

    function getGitHubRawURL(path) {
      if (!window.location.hostname.endsWith('.github.io') || !path.startsWith('data/')) return null;
      const owner = window.location.hostname.replace(/\.github\.io$/, '');
      const repo = window.location.pathname.split('/').filter(Boolean)[0];
      if (!owner || !repo) return null;
      return `https://raw.githubusercontent.com/${owner}/${repo}/refs/heads/main/${path}`;
    }

    function getAssetURL(path) {
      if (!path) return path;
      const version = state.manifest?.lastUpdated || REQUEST_VERSION;
      return withCacheBust(path, version);
    }

    function updateLastUpdatedLabel(lastUpdated) {
      if (!lastUpdated) return;
      const dt = new Date(lastUpdated);
      document.getElementById('lastUpdated').textContent =
        `最後更新：${dt.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' })}`;
    }

    async function fetchJSON(url) {
      const candidates = [withCacheBust(url)];
      const rawURL = getGitHubRawURL(url);
      if (rawURL) candidates.push(withCacheBust(rawURL));

      for (const candidate of candidates) {
        try {
          const res = await fetch(candidate, { cache: 'no-store' });
          if (!res.ok) continue;
          return await res.json();
        } catch {}
      }
      return null;
    }

    async function fetchHTML(url) {
      try {
        const res = await fetch(withCacheBust(url), { cache: 'no-store' });
        if (!res.ok) return null;
        return await res.text();
      } catch {
        return null;
      }
    }

    function renderShellError(message) {
      document.getElementById('tabContainer').innerHTML = `
        <div class="card">
          <div class="empty-state" style="padding: 32px 20px;">
            <div class="empty-icon">⚠️</div>
            <h3>頁面載入失敗</h3>
            <p>${message}</p>
          </div>
        </div>
      `;
    }

    async function loadTabPartials() {
      const partials = await Promise.all(TAB_PARTIALS.map(path => fetchHTML(path)));
      if (partials.some(partial => !partial)) {
        renderShellError('部分內容檔案不存在，請確認 partials 目錄是否完整。');
        return false;
      }

      document.getElementById('tabContainer').innerHTML = partials.join('\n');
      return true;
    }

    async function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.toggle('active', content.id === tabId);
      });

      if (tabId === 'history') await renderHistory();
      if (tabId === 'inbody') await renderInBody();
      if (tabId === 'goals') renderGoals();
    }

    function setupTabNavigation() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          await switchTab(btn.dataset.tab);
        });
      });
    }

    function setupDateNavigation() {
      document.getElementById('prevDay').addEventListener('click', () => {
        state.currentDate = addDays(state.currentDate, -1);
        loadDay(state.currentDate);
      });

      document.getElementById('nextDay').addEventListener('click', () => {
        const today = getTodayTaipei();
        if (state.currentDate < today) {
          state.currentDate = addDays(state.currentDate, 1);
          loadDay(state.currentDate);
        }
      });
    }

    // ===== Load & Render Day =====
    async function loadDay(dateStr, { forceRefresh = false } = {}) {
      state.currentDate = dateStr;
      document.getElementById('currentDate').textContent = dateStr;
      document.getElementById('currentWeekday').textContent = getWeekday(dateStr);

      const today = getTodayTaipei();
      document.getElementById('nextDay').disabled = (dateStr >= today);

      if (forceRefresh || !state.dayCache[dateStr]) {
        state.dayCache[dateStr] = await fetchJSON(`data/${dateStr}.json`);
      }
      renderDay(state.dayCache[dateStr]);
    }

    function renderDay(data) {
      const mealsContainer = document.getElementById('mealsContainer');
      const adviceContainer = document.getElementById('adviceContainer');
      const emptyState = document.getElementById('emptyToday');

      if (!data) {
        // No data
        mealsContainer.innerHTML = '';
        adviceContainer.innerHTML = '';
        emptyState.style.display = 'block';
        updateMacros(null);
        updateCostSummary(null);
        return;
      }

      emptyState.style.display = 'none';
      updateMacros(data.dailyTotal);
      updateCostSummary(data);

      // Render meals
      mealsContainer.innerHTML = data.meals.map(meal => {
        const icon = MEAL_ICONS[meal.type] || '🍽️';
        const mealTitle = meal.displayName || `${icon} ${meal.type}`;
        const mealMeta = meal.displayName
          ? [ `${icon} ${meal.type}`, meal.time ].filter(Boolean).join(' · ')
          : meal.time || '';
        const mealCost = getMealCost(meal);
        const seenPhotos = new Set();
        const photos = meal.items.filter(i => i.image).reduce((acc, i) => {
          const imageUrl = getAssetURL(i.image);
          if (!seenPhotos.has(imageUrl)) {
            seenPhotos.add(imageUrl);
            acc += `<img src="${imageUrl}" alt="${i.name}" loading="lazy" onclick="openLightbox('${imageUrl}')">`;
          }
          return acc;
        }, '');

        const items = meal.items.map(item => `
          <div class="meal-item">
            ${item.image && !seenPhotos.has(getAssetURL(item.image)) ? `<img class="meal-item-photo" src="${getAssetURL(item.image)}" alt="${item.name}" loading="lazy" onclick="event.stopPropagation();openLightbox('${getAssetURL(item.image)}')">` : ''}
            <div class="meal-item-info">
              <div class="meal-item-name">${item.name}</div>
              <div class="meal-item-macros">
                <span>🔥 ${item.calories}</span>
                <span>P ${item.protein}g</span>
                <span>F ${item.fat}g</span>
                <span>C ${item.carbs}g</span>
              </div>
            </div>
          </div>
        `).join('');

        return `
          <div class="meal-card">
            <div class="meal-header">
              <div class="meal-header-main">
                <div class="meal-title">${mealTitle}</div>
                ${mealMeta ? `<div class="meal-meta">${mealMeta}</div>` : ''}
              </div>
              <div class="meal-header-totals">
                ${mealCost !== null ? `<span class="meal-cost">${formatCurrencyTWD(mealCost)}</span>` : ''}
                <span class="meal-kcal">${meal.subtotal?.calories || 0} kcal</span>
                <div class="meal-subtotal-macros">
                  <span>🥩 ${meal.subtotal?.protein || 0}g</span>
                  <span>🧈 ${meal.subtotal?.fat || 0}g</span>
                  <span>🍚 ${meal.subtotal?.carbs || 0}g</span>
                </div>
              </div>
            </div>
            ${photos ? `<div class="meal-photos">${photos}</div>` : ''}
            <div class="meal-body">${items}</div>
          </div>
        `;
      }).join('');

      // Render advice
      if (data.advice) {
        adviceContainer.innerHTML = `
          <div class="advice-box">
            <div class="advice-title">💡 AI 營養師建議</div>
            <div class="advice-text">${data.advice.replace(/\n/g, '<br>')}</div>
          </div>
        `;
      } else {
        adviceContainer.innerHTML = '';
      }
    }

    function updateCostSummary(data) {
      const summary = document.getElementById('costSummary');
      if (!summary) return;

      const totalCost = getDailyCost(data);
      if (totalCost === null) {
        summary.style.display = 'none';
        return;
      }

      summary.style.display = 'block';
      document.getElementById('totalCostValue').textContent = formatCurrencyTWD(totalCost);
    }

    function updateMacros(totals) {
      const g = state.goals || {};
      const cal = totals?.calories || 0;
      const protein = totals?.protein || 0;
      const fat = totals?.fat || 0;
      const carbs = totals?.carbs || 0;

      document.getElementById('totalCal').textContent = cal;
      document.getElementById('totalProtein').textContent = protein + 'g';
      document.getElementById('totalFat').textContent = fat + 'g';
      document.getElementById('totalCarbs').textContent = carbs + 'g';

      document.getElementById('goalCal').textContent = `/ ${g.dailyCalories || '-'}`;
      document.getElementById('goalProtein').textContent = `/ ${g.protein || '-'}g`;
      document.getElementById('goalFat').textContent = `≤ ${g.fat || '-'}g`;
      document.getElementById('goalCarbs').textContent = `/ ${g.carbs || '-'}g`;

      document.getElementById('barCal').style.width = pct(cal, g.dailyCalories) + '%';
      document.getElementById('barProtein').style.width = pct(protein, g.protein) + '%';
      document.getElementById('barFat').style.width = pct(fat, g.fat) + '%';
      document.getElementById('barCarbs').style.width = pct(carbs, g.carbs) + '%';
    }

    // ===== History Tab =====
    async function renderHistory() {
      const list = document.getElementById('historyList');
      const empty = document.getElementById('emptyHistory');

      if (!state.manifest || state.manifest.days.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const days = [...state.manifest.days].sort().reverse();
      let html = '';
      for (const day of days) {
        if (!state.dayCache[day]) {
          state.dayCache[day] = await fetchJSON(`data/${day}.json`);
        }
        const d = state.dayCache[day];
        const date = new Date(day + 'T00:00:00+08:00');
        const dayNum = date.getDate();
        const month = date.getMonth() + 1;
        const total = d?.dailyTotal;
        const cost = getDailyCost(d);
        const summary = total
          ? `${total.calories} kcal · P ${total.protein}g · F ${total.fat}g · C ${total.carbs}g`
          : '無資料';

        html += `
          <li class="history-item" onclick="goToDay('${day}')">
            <div class="history-date-badge">
              <span class="h-day">${dayNum}</span>
              <span class="h-month">${month}月</span>
            </div>
            <div class="history-info">
              <div class="history-topline">
                <div class="h-date">${day} (${WEEKDAYS[date.getDay()]})</div>
                ${cost !== null ? `<span class="history-cost">${formatCurrencyTWD(cost)}</span>` : ''}
              </div>
              <div class="h-summary">${summary}</div>
            </div>
            <span class="history-arrow">›</span>
          </li>
        `;
      }
      list.innerHTML = html;
    }

    async function goToDay(dateStr) {
      state.currentDate = dateStr;
      await loadDay(dateStr);
      await switchTab('today');
    }

    // ===== InBody Tab =====
    async function renderInBody() {
      const container = document.getElementById('inbodyContent');
      const empty = document.getElementById('emptyInbody');

      if (!state.manifest || state.manifest.inbody.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const dates = [...state.manifest.inbody].sort().reverse();
      // Load all inbody data
      const allData = [];
      for (const d of dates) {
        if (!state.inbodyCache[d]) {
          state.inbodyCache[d] = await fetchJSON(`data/inbody/${d}.json`);
        }
        if (state.inbodyCache[d]) allData.push(state.inbodyCache[d]);
      }

      if (allData.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      const latest = allData[0];
      let html = '';

      // Latest card
      html += `
        <div class="inbody-latest">
          <div class="inbody-title">📊 最新 InBody 數據 — ${latest.date}</div>
          <div class="inbody-metrics">
            <div class="inbody-metric">
              <div class="metric-label">體重</div>
              <div class="metric-value">${latest.weight || '-'}</div>
              <div class="metric-unit">kg</div>
            </div>
            <div class="inbody-metric">
              <div class="metric-label">體脂率</div>
              <div class="metric-value">${latest.bodyFatPercent || '-'}</div>
              <div class="metric-unit">%</div>
            </div>
            <div class="inbody-metric">
              <div class="metric-label">骨骼肌量</div>
              <div class="metric-value">${latest.muscleMass || '-'}</div>
              <div class="metric-unit">kg</div>
            </div>
            <div class="inbody-metric">
              <div class="metric-label">BMI</div>
              <div class="metric-value">${latest.bmi || '-'}</div>
              <div class="metric-unit"></div>
            </div>
            <div class="inbody-metric">
              <div class="metric-label">基礎代謝</div>
              <div class="metric-value">${latest.basalMetabolicRate || '-'}</div>
              <div class="metric-unit">kcal</div>
            </div>
            <div class="inbody-metric">
              <div class="metric-label">內臟脂肪</div>
              <div class="metric-value">${latest.visceralFat || '-'}</div>
              <div class="metric-unit">等級</div>
            </div>
          </div>
          ${latest.image ? `
            <div class="inbody-photo-container">
              <img src="${getAssetURL(latest.image)}" alt="InBody 報告" loading="lazy" onclick="openLightbox('${getAssetURL(latest.image)}')" style="margin-top:16px; max-height:400px;">
            </div>
          ` : ''}
        </div>
      `;

      // Trend chart (if more than 1 data point)
      if (allData.length > 1) {
        html += renderTrendChart(allData.reverse());
      }

      // History list
      if (allData.length > 1) {
        html += '<div class="card"><div class="card-title">📋 歷史測量</div>';
        for (const item of [...allData].reverse()) {
          if (item.date === latest.date) continue;
          html += `
            <div class="inbody-history-item" onclick="${item.image ? `openLightbox('${getAssetURL(item.image)}')` : ''}">
              <div class="history-date-badge">
                <span class="h-day">${new Date(item.date+'T00:00:00+08:00').getDate()}</span>
                <span class="h-month">${new Date(item.date+'T00:00:00+08:00').getMonth()+1}月</span>
              </div>
              <div class="history-info">
                <div class="h-date">${item.date}</div>
                <div class="h-summary">${item.weight}kg · 體脂 ${item.bodyFatPercent}% · 肌肉 ${item.muscleMass}kg</div>
              </div>
            </div>
          `;
        }
        html += '</div>';
      }

      container.innerHTML = html;
    }

    function renderTrendChart(dataAsc) {
      const w = 700, h = 200, pad = { top: 30, right: 60, bottom: 40, left: 50 };
      const innerW = w - pad.left - pad.right;
      const innerH = h - pad.top - pad.bottom;

      const weights = dataAsc.map(d => d.weight);
      const bodyFats = dataAsc.map(d => d.bodyFatPercent);
      const minW = Math.floor(Math.min(...weights) - 2);
      const maxW = Math.ceil(Math.max(...weights) + 2);
      const minBF = Math.floor(Math.min(...bodyFats) - 2);
      const maxBF = Math.ceil(Math.max(...bodyFats) + 2);

      const xStep = dataAsc.length > 1 ? innerW / (dataAsc.length - 1) : innerW / 2;

      function yW(v) { return pad.top + innerH - ((v - minW) / (maxW - minW)) * innerH; }
      function yBF(v) { return pad.top + innerH - ((v - minBF) / (maxBF - minBF)) * innerH; }

      let weightPath = dataAsc.map((d, i) => `${i === 0 ? 'M' : 'L'}${pad.left + i * xStep},${yW(d.weight)}`).join(' ');
      let bfPath = dataAsc.map((d, i) => `${i === 0 ? 'M' : 'L'}${pad.left + i * xStep},${yBF(d.bodyFatPercent)}`).join(' ');

      let dots = dataAsc.map((d, i) => {
        const x = pad.left + i * xStep;
        return `
          <circle cx="${x}" cy="${yW(d.weight)}" r="4" fill="var(--chart-weight)" class="trend-dot"/>
          <text x="${x}" y="${yW(d.weight) - 8}" text-anchor="middle" class="trend-value-label" fill="var(--chart-weight)">${d.weight}</text>
          <circle cx="${x}" cy="${yBF(d.bodyFatPercent)}" r="4" fill="var(--chart-body-fat)" class="trend-dot"/>
          <text x="${x}" y="${yBF(d.bodyFatPercent) - 8}" text-anchor="middle" class="trend-value-label" fill="var(--chart-body-fat)">${d.bodyFatPercent}</text>
          <text x="${x}" y="${h - 8}" text-anchor="middle" class="trend-label">${d.date.slice(5)}</text>
        `;
      }).join('');

      return `
        <div class="inbody-chart-container">
          <div class="card-title">📈 趨勢變化</div>
          <svg class="trend-chart" viewBox="0 0 ${w} ${h}">
            <!-- Grid -->
            <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top + innerH}" stroke="${'var(--md-outline-variant)'}" stroke-width="1"/>
            <line x1="${pad.left}" y1="${pad.top + innerH}" x2="${pad.left + innerW}" y2="${pad.top + innerH}" stroke="${'var(--md-outline-variant)'}" stroke-width="1"/>
            <!-- Weight line -->
            <path d="${weightPath}" class="trend-line" stroke="var(--chart-weight)"/>
            <!-- Body fat line -->
            <path d="${bfPath}" class="trend-line" stroke="var(--chart-body-fat)"/>
            ${dots}
            <!-- Legend -->
            <circle cx="${pad.left}" cy="12" r="5" fill="var(--chart-weight)"/>
            <text x="${pad.left + 10}" y="16" class="trend-label" fill="var(--chart-weight)">體重 (kg)</text>
            <circle cx="${pad.left + 90}" cy="12" r="5" fill="var(--chart-body-fat)"/>
            <text x="${pad.left + 100}" y="16" class="trend-label" fill="var(--chart-body-fat)">體脂率 (%)</text>
          </svg>
        </div>
      `;
    }

    // ===== Goals Tab =====
    function renderGoals() {
      const g = state.goals;
      if (!g) return;
      document.getElementById('goalsContent').innerHTML = `
        <div class="goal-item">
          <span class="goal-label"><span class="goal-dot" style="background:var(--color-calories)"></span>每日熱量</span>
          <span class="goal-value">${g.dailyCalories} <span class="goal-unit">kcal</span></span>
        </div>
        <div class="goal-item">
          <span class="goal-label"><span class="goal-dot" style="background:var(--color-protein)"></span>蛋白質</span>
          <span class="goal-value">${g.protein} <span class="goal-unit">g</span></span>
        </div>
        <div class="goal-item">
          <span class="goal-label"><span class="goal-dot" style="background:var(--color-fat)"></span>脂肪（上限）</span>
          <span class="goal-value">≤ ${g.fat} <span class="goal-unit">g</span></span>
        </div>
        <div class="goal-item">
          <span class="goal-label"><span class="goal-dot" style="background:var(--color-carbs)"></span>碳水化合物</span>
          <span class="goal-value">${g.carbs} <span class="goal-unit">g</span></span>
        </div>
        <div style="margin-top: 12px; padding: 12px; background: var(--md-surface-container-low); border-radius: var(--md-shape-sm); font-size: 13px; color: var(--md-on-surface-variant);">
          📝 ${g.note || ''}
        </div>
      `;
    }

    // ===== Lightbox =====
    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    async function refreshManifest() {
      const latestManifest = await fetchJSON('data/manifest.json');
      if (!latestManifest) return;

      const previousLastUpdated = state.manifest?.lastUpdated;
      state.manifest = latestManifest;
      updateLastUpdatedLabel(latestManifest.lastUpdated);

      if (!previousLastUpdated || previousLastUpdated === latestManifest.lastUpdated) return;

      state.dayCache = {};
      state.inbodyCache = {};

      await loadDay(state.currentDate, { forceRefresh: true });
      if (document.getElementById('history').classList.contains('active')) await renderHistory();
      if (document.getElementById('inbody').classList.contains('active')) await renderInBody();
    }

    // ===== Init =====
    async function init() {
      const partialsLoaded = await loadTabPartials();
      if (!partialsLoaded) return;

      setupTabNavigation();
      setupDateNavigation();

      const [goals, manifest] = await Promise.all([
        fetchJSON('data/goals.json'),
        fetchJSON('data/manifest.json')
      ]);

      state.goals = goals;
      state.manifest = manifest;

      const today = getTodayTaipei();
      state.currentDate = today;
      await loadDay(today);

      updateLastUpdatedLabel(manifest?.lastUpdated);
      const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'today';
      if (activeTab !== 'today') {
        await switchTab(activeTab);
      }
      window.setInterval(refreshManifest, MANIFEST_POLL_MS);
    }

    init();
  </script>
</body>
</html>
